<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Master | Fidélité Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Fond blanc et texte noir par défaut */
        body { background-color: #ffffff; font-family: 'Inter', sans-serif; color: #000000; }
        
        /* Inputs : Fond très clair, texte noir et bordure noire au focus */
        .glass-input { 
            background: #f8fafc; 
            border: 1px solid #e2e8f0; 
            color: #000000;
            transition: all 0.3s ease; 
        }
        .glass-input:focus { 
            border-color: #000000; 
            background: #ffffff; 
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1); 
            outline: none; 
        }

        /* Le bouton : Noir profond avec effet de lueur */
        .btn-glow { 
            background: #000000; 
            color: #ffffff;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3); 
            transition: all 0.2s; 
        }
        .btn-glow:active { transform: scale(0.95); box-shadow: 0 0 5px rgba(0, 0, 0, 0.2); }
        
        /* Labels en gris foncé */
        .floating-label { 
            font-size: 10px; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 0.2em; 
            color: #475569; 
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">

    <div class="text-center mb-10">
        <div class="relative inline-block">
            <div class="w-20 h-20 bg-black rounded-[2rem] flex items-center justify-center mb-6 shadow-xl border border-slate-100 relative z-10">
                <i class="fa-solid fa-shield-halved text-white text-3xl"></i>
            </div>
        </div>
        <h1 class="text-2xl font-black uppercase tracking-tighter text-black">Accès <span class="text-slate-500">Master</span></h1>
        <p class="floating-label mt-2 text-slate-500">Administration de la plateforme</p>
    </div>

    <div class="w-full max-w-sm">
        <form id="loginForm" class="space-y-6">
            
            <div class="relative">
                <label class="floating-label ml-4 mb-2 block">Email Administrateur</label>
                <div class="relative mb-4">
                    <i class="fa-solid fa-user-shield absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                    <input type="email" id="email" required 
                           placeholder="admin@plateforme.com" 
                           class="glass-input w-full py-5 pl-14 pr-6 rounded-3xl font-medium text-lg">
                </div>

                <label class="floating-label ml-4 mb-2 block">Mot de passe secret</label>
                <div class="relative">
                    <i class="fa-solid fa-key absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                    <input type="password" id="password" required 
                           placeholder="••••••••" 
                           class="glass-input w-full py-5 pl-14 pr-6 rounded-3xl font-medium tracking-widest text-lg">
                </div>
            </div>

            <button type="submit" id="btnText" class="btn-glow w-full py-5 rounded-3xl font-black uppercase tracking-widest text-sm mt-4 flex items-center justify-center gap-3">
                <span>S'authentifier</span> <i class="fa-solid fa-arrow-right text-xs"></i>
            </button>
            
        </form>

        <div id="errorMessage" class="hidden mt-8 p-4 bg-red-50 rounded-2xl text-red-600 text-[10px] font-black text-center uppercase tracking-widest border border-red-100">
            Identifiants incorrects
        </div>

        <p class="text-center mt-12 text-slate-400 text-[9px] font-bold uppercase tracking-[0.3em]">
            &copy; 2026 Plateforme Fidélité <br> <span class="text-slate-300">Sécurité Niveau 3</span>
        </p>
    </div>

    <script>
    const { createClient } = window.supabase;
    let supabaseClient;

    // Initialisation dynamique
    async function init() {
        try {
            const response = await fetch('/admin/api/config');
            const config = await response.json();
            supabaseClient = createClient(config.url, config.key);
        } catch (err) {
            console.error("Erreur de chargement de la config");
        }
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!supabaseClient) await init(); // Sécurité si pas encore chargé

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const btn = document.getElementById('btnText');
        const errorBox = document.getElementById('errorMessage');

        btn.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin"></i>';
        btn.disabled = true;
        errorBox.classList.add('hidden');

        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

        // On envoie le log au serveur Render
        fetch('/admin/api/log-auth', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ email, status: error ? 'ÉCHEC' : 'SUCCÈS' })
        });

        if (error) {
            btn.innerHTML = '<span>S\'authentifier</span> <i class="fa-solid fa-arrow-right text-xs"></i>';
            btn.disabled = false;
            errorBox.innerText = "ERREUR : " + error.message.toUpperCase();
            errorBox.classList.remove('hidden');
        } else {
            window.location.href = `/admin/inventory?auth=${data.session.access_token}`;
        }
    });

    window.onload = () => {
        init();
        document.getElementById('email').focus();
    };
</script>
</body>
</html>
</body>
</html>
