<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Master | Fidélité Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-md">
        <div class="bg-white rounded-[2rem] shadow-xl shadow-slate-200/60 p-10 border border-slate-100">
            <div class="text-center mb-10">
                <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-indigo-200">
                    <i class="fa-solid fa-shield-halved text-white text-2xl"></i>
                </div>
                <h1 class="text-2xl font-black text-slate-900 uppercase tracking-tight">Accès <span class="text-indigo-600">Master</span></h1>
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mt-2">Administration de la plateforme</p>
            </div>

            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Email Administrateur</label>
                    <input type="email" id="email" required 
                        class="w-full mt-2 px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-indigo-600 focus:bg-white transition font-semibold text-slate-700">
                </div>

                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Mot de passe</label>
                    <input type="password" id="password" required 
                        class="w-full mt-2 px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-indigo-600 focus:bg-white transition font-semibold text-slate-700">
                </div>

                <button type="submit" id="btnText"
                    class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase tracking-widest text-xs hover:bg-indigo-600 hover:scale-[1.02] transition-all shadow-xl shadow-slate-200">
                    S'authentifier
                </button>
            </form>

            <div id="errorMessage" class="hidden mt-6 p-4 bg-red-50 rounded-xl text-red-500 text-xs font-bold text-center uppercase tracking-tight">
                Identifiants incorrects
            </div>
        </div>
        
        <p class="text-center mt-8 text-slate-400 text-[10px] font-bold uppercase tracking-widest">
            &copy; 2026 Plateforme Fidélité - Sécurité Niveau 3
        </p>
    </div>

    <script>
        // Correction ici : on utilise l'objet 'supabase' de la bibliothèque chargée via CDN
        const { createClient } = window.supabase; 
        const supabaseClient = createClient('{{supabase_url}}', '{{supabase_key}}');

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btnText');
            const errorBox = document.getElementById('errorMessage');

            btn.innerText = "VÉRIFICATION...";
            btn.disabled = true; // Empêche le double clic
            errorBox.classList.add('hidden');

            // On utilise supabaseClient au lieu de supabase (pour éviter la confusion de nom)
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

            if (error) {
                btn.innerText = "S'AUTHENTIFIER";
                btn.disabled = false;
                errorBox.innerText = error.message; // Affiche l'erreur réelle (ex: invalid credentials)
                errorBox.classList.remove('hidden');
            } else {
                // Redirection vers l'inventaire avec le token session
                window.location.href = `/admin/inventory?auth=${data.session.access_token}`;
            }
        });
</script>
</body>
</html>
