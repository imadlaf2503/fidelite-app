<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Configuration Commerce</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; overflow: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Style Editeur Clair */
        .code-editor { font-family: 'Fira Code', monospace; background: #ffffff; border: 1px solid #e2e8f0; color: #475569; font-size: 11px; resize: none; width: 100%; border-radius: 12px; padding: 12px; transition: all 0.2s; }
        .code-editor:focus { border-color: #6366f1; outline: none; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }

        .input-pro { background: #ffffff; border: 1px solid #e2e8f0; color: #1e293b; border-radius: 12px; padding: 12px; font-size: 13px; width: 100%; outline: none; transition: all 0.2s; }
        .input-pro:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }
        
        .section-label { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-bottom: 12px; border-left: 3px solid #6366f1; padding-left: 10px; }

        .file-upload { position: relative; display: flex; align-items: center; justify-content: center; background: #ffffff; border: 2px dashed #e2e8f0; border-radius: 12px; padding: 20px; cursor: pointer; transition: all 0.2s; }
        .file-upload:hover { border-color: #6366f1; background: #f1f5ff; }

        .device-mobile { width: 280px; height: 560px; border: 10px solid #1e293b; border-radius: 40px; overflow: hidden; background: #fff; position: relative; flex-shrink: 0; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15); }
        .mobile-notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 90px; height: 18px; background: #1e293b; border-bottom-left-radius: 12px; border-bottom-right-radius: 12px; z-index: 50; }
        
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="h-screen flex">

    <aside class="w-[550px] bg-white border-r border-slate-200 flex flex-col z-30 shadow-xl">
        <div class="p-6 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
            <div class="flex items-center gap-4">
                <a href="/admin/inventory" class="text-slate-400 hover:text-slate-900 transition"><i class="fa-solid fa-arrow-left"></i></a>
                <h1 class="text-lg font-black tracking-tight text-slate-900 uppercase">{{formTitle}}</h1>
            </div>
            <span class="text-[10px] bg-indigo-50 px-2 py-1 rounded text-indigo-600 font-bold font-mono uppercase">Studio v3.1</span>
        </div>

        <form action="{{formAction}}" method="POST" enctype="multipart/form-data" class="flex-grow overflow-y-auto no-scrollbar p-8 space-y-10 pb-10">
            
            <section>
                <span class="section-label">Identité Propriétaire</span>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <input type="text" name="g_prenom" value="{{g_prenom}}" placeholder="Prénom" class="input-pro" required>
                    <input type="text" name="g_nom" value="{{g_nom}}" placeholder="Nom" class="input-pro" required>
                </div>
                <input type="email" name="g_email" value="{{g_email}}" placeholder="Email de connexion" class="input-pro mb-4" required>
                <input type="tel" name="g_tel" value="{{g_tel}}" placeholder="Téléphone" class="input-pro" required>
            </section>

            <section>
                <span class="section-label">Sécurité Dashboard</span>
                <div class="bg-indigo-50/50 p-4 rounded-2xl border border-indigo-100">
                    <label class="text-[9px] uppercase text-indigo-400 font-black mb-2 block">ID d'accès (Mot de passe commerçant)</label>
                    <input type="text" name="password" value="{{password}}" placeholder="Ex: 1234" class="input-pro font-bold tracking-widest text-indigo-600 border-indigo-200" required>
                </div>
            </section>

            <section>
                <span class="section-label">Gestion de l'Abonnement</span>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[9px] uppercase text-slate-500 font-bold mb-2 block">Prix Mensuel (€)</label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold">€</span>
                            <input type="number" name="prix_mensuel" value="{{prix}}" placeholder="49" class="input-pro pl-8 font-black text-indigo-600" required>
                        </div>
                    </div>
                    <div>
                        <label class="text-[9px] uppercase text-slate-500 font-bold mb-2 block">État du compte</label>
                        <select name="statut" class="input-pro font-bold text-xs">
                            <option value="essai" {{selected_essai}}>Période d'essai</option>
                            <option value="payé" {{selected_paye}}>Abonnement Payé</option>
                            <option value="attente" {{selected_attente}}>En attente de paiement</option>
                        </select>
                    </div>
                </div>
            </section>

            <section>
                <span class="section-label">Configuration Enseigne</span>
                <input type="text" id="in-nom" name="nom" value="{{nom}}" oninput="updatePreview()" placeholder="Nom commercial" class="input-pro mb-4 font-bold text-base text-indigo-600" required>
                
                <label class="file-upload mb-4">
                    <div class="text-center">
                        <i class="fa-solid fa-cloud-arrow-up text-indigo-500 text-xl mb-2"></i>
                        <p class="text-[10px] text-slate-500 uppercase font-extrabold">Logo de l'enseigne</p>
                    </div>
                    <input type="file" name="logo_file" id="in-logo-file" class="hidden" accept="image/*" onchange="previewImage(this)">
                </label>

                <div class="grid grid-cols-3 gap-4">
                    <input type="text" name="slug" value="{{slug}}" placeholder="slug-url" class="input-pro col-span-2 text-xs font-mono bg-slate-50" required {{slugReadonly}}>
                    <input type="color" id="in-color" name="couleur" oninput="updatePreview()" value="{{couleur}}" class="w-full h-[48px] p-1 bg-white border border-slate-200 rounded-xl cursor-pointer">
                </div>
            </section>

            <section>
                <span class="section-label">Programme de Fidélité</span>
                <div class="bg-slate-50 p-5 rounded-2xl border border-slate-100 space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[9px] uppercase text-slate-500 font-bold mb-2 block">Gain : 1€ =</label>
                            <div class="flex items-center gap-2">
                                <input type="number" name="points_per_euro" value="{{points_per_euro}}" class="input-pro text-center font-bold">
                                <span class="text-[10px] font-black">PTS</span>
                            </div>
                        </div>
                        <div>
                            <label class="text-[9px] uppercase text-slate-500 font-bold mb-2 block">Mode de gestion</label>
                            <select name="logic_type" class="input-pro text-xs font-bold">
                                <option value="reset" {{selected_reset}}>Reset à chaque cadeau</option>
                                <option value="paliers" {{selected_paliers}}>Paliers progressifs</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="text-[9px] uppercase text-slate-500 font-bold mb-2 block">Configuration des Paliers (ex: 10:Dessert, 20:Menu)</label>
                        <input type="text" name="points_thresholds" value="{{points_thresholds}}" placeholder="10:Cadeau A, 20:Cadeau B" class="input-pro font-mono text-xs">
                    </div>
                </div>
            </section>

            <section class="space-y-4">
                <span class="section-label">Design de la Carte</span>
                <textarea id="in-card-html" name="card_html" oninput="updatePreview()" class="code-editor h-32" placeholder="HTML de la carte...">{{card_html}}</textarea>
                <textarea id="in-card-css" name="card_css" oninput="updatePreview()" class="code-editor h-40" placeholder="CSS de la carte...">{{card_css}}</textarea>
            </section>

            <button type="submit" class="w-full bg-slate-900 hover:bg-indigo-600 text-white font-black py-5 rounded-2xl shadow-lg shadow-slate-200 transition transform active:scale-[0.98] uppercase tracking-widest text-xs">
                {{submitText}}
            </button>
        </form>
    </aside>

    <main class="flex-grow bg-slate-50 p-6 overflow-y-auto no-scrollbar flex flex-col items-center justify-center relative">
        <div class="absolute top-10 flex items-center gap-3">
            <span class="text-[10px] font-black uppercase tracking-[0.4em] text-slate-300">Live Preview System</span>
        </div>
        <style id="card-style"></style>
        <div class="device-mobile">
            <div class="mobile-notch"></div>
            <div class="card-view h-full w-full overflow-y-auto no-scrollbar" id="card-content"></div>
        </div>
        <div class="mt-8 flex gap-4">
            <div class="px-4 py-2 bg-white border border-slate-200 rounded-full shadow-sm flex items-center gap-2">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                <span class="text-[10px] font-bold text-slate-500">Mode Mobile Actif</span>
            </div>
        </div>
    </main>

    <script>
        let currentLogoBase64 = "{{logo_url}}";
        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentLogoBase64 = e.target.result;
                    updatePreview();
                }
                reader.readAsDataURL(input.files[0]);
            }
        }
        function updatePreview() {
            document.getElementById('card-style').innerHTML = document.getElementById('in-card-css').value;
            let html = document.getElementById('in-card-html').value;
            html = html.replace(/{{prenom_client}}/g, "Jean");
            html = html.replace(/{{points}}/g, "15");
            html = html.replace(/{{qr_client}}/g, "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=PREVIEW");
            document.getElementById('card-content').innerHTML = html;
            const logoInCard = document.querySelector('#card-content img[src*="logo"]'); 
            if (logoInCard && currentLogoBase64) { logoInCard.src = currentLogoBase64; }
        }
        updatePreview();
    </script>
</body>
</html>
