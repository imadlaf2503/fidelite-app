<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard | {{nom}}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --text: #0f172a;
            --text-light: #64748b;
            --border: #e2e8f0;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --sidebar-width: 280px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: var(--text);
            line-height: 1.5;
        }

        /* --- LAYOUT PRINCIPAL --- */
        .app-wrapper { display: flex; min-height: 100vh; }

        /* --- SIDEBAR (PC) --- */
        .sidebar {
            width: var(--sidebar-width);
            background: white;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 32px 24px;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .logo-box { margin-bottom: 40px; text-align: center; }
        .logo-box img { max-width: 140px; max-height: 50px; object-fit: contain; }

        .nav-menu { display: flex; flex-direction: column; gap: 8px; flex-grow: 1; }
        .nav-link {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px; border-radius: 12px;
            color: var(--text-light); text-decoration: none;
            font-weight: 600; font-size: 14px; transition: 0.2s;
        }
        .nav-link:hover { background: #f1f5f9; color: var(--text); }
        .nav-link.active { background: var(--primary); color: white; }

        .nav-logout { color: var(--danger); margin-top: auto; border-top: 1px solid var(--border); pt-20; }

        /* --- CONTENU --- */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 40px;
            max-width: 1200px;
        }

        /* --- HEADER --- */
        .header-flex { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 32px; }
        .business-badge { 
            background: #dcfce7; color: #166534; 
            padding: 4px 12px; border-radius: 99px; 
            font-size: 11px; font-weight: 800; text-transform: uppercase;
        }

        /* --- GRILLE DE STATS --- */
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); 
            gap: 20px; margin-bottom: 32px; 
        }
        .stat-card { 
            background: white; padding: 24px; border-radius: 20px; 
            border: 1px solid var(--border);
        }
        .stat-card span { color: var(--text-light); font-size: 13px; font-weight: 600; text-transform: uppercase; }
        .stat-card h2 { margin: 8px 0 0; font-size: 28px; font-weight: 800; }

        /* --- SECTIONS BLANCHES --- */
        .section-card { 
            background: white; border-radius: 24px; 
            border: 1px solid var(--border); padding: 24px; 
            margin-bottom: 24px;
        }
        .section-title { font-weight: 800; font-size: 18px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

        /* --- TABLEAU --- */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { text-align: left; padding: 12px; color: var(--text-light); font-size: 11px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 16px 12px; border-bottom: 1px solid #f8fafc; font-size: 14px; }

        .points-pill { 
            background: #eef2ff; color: var(--primary); 
            padding: 6px 12px; border-radius: 8px; font-weight: 800;
        }
        .points-pill.ready { background: var(--warning); color: white; }

        /* --- MOBILE NAVIGATION (Bottom Bar) --- */
        .mobile-nav { display: none; }

        /* --- RESPONSIVE --- */
        @media (max-width: 992px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding: 20px; padding-bottom: 100px; }
            .header-flex { flex-direction: column; gap: 15px; }
            
            .mobile-nav {
                display: flex; position: fixed; bottom: 0; left: 0; right: 0;
                background: white; border-top: 1px solid var(--border);
                padding: 12px 20px; justify-content: space-around; z-index: 1000;
                padding-bottom: calc(12px + env(safe-area-inset-bottom));
            }
            .mobile-link { 
                display: flex; flex-direction: column; align-items: center; 
                gap: 4px; color: var(--text-light); text-decoration: none; font-size: 10px; font-weight: 700;
            }
            .mobile-link.active { color: var(--primary); }
            .mobile-link i { font-size: 20px; }

            .scan-fab {
                background: var(--primary); color: white; width: 56px; height: 56px;
                border-radius: 50%; display: flex; align-items: center; justify-content: center;
                font-size: 24px; margin-top: -40px; border: 5px solid var(--bg);
                box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
            }
        }

        /* --- MODAL --- */
        #passwordModal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-box { background: white; width: 90%; max-width: 400px; padding: 32px; border-radius: 24px; }
        .modal-input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border); margin: 8px 0 16px; outline: none; }
        .modal-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <aside class="sidebar">
        <div class="logo-box">
            <img src="{{logo_url}}" alt="Logo">
        </div>
        <nav class="nav-menu">
            <a href="#" class="nav-link active"><i class="fa-solid fa-house"></i> Accueil</a>
            <a href="/scanner/{{slug}}?auth={{auth_token}}" class="nav-link"><i class="fa-solid fa-qrcode"></i> Scanner</a>
            <button onclick="openPasswordModal()" class="nav-link" style="background:none; border:none; width:100%; cursor:pointer;"><i class="fa-solid fa-lock"></i> Sécurité ID</button>
            <a href="/dashboard/{{slug}}/logout" class="nav-link nav-logout"><i class="fa-solid fa-power-off"></i> Déconnexion</a>
        </nav>
        
        <div style="margin-top: 20px; padding: 20px; background: #f8fafc; border-radius: 16px; text-align: center;">
            <p style="font-size: 10px; font-weight: 800; margin-bottom: 10px;">QR CODE COMPTOIR</p>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://{{slug}}.onrender.app/signup/{{slug}}" style="width:100px; border-radius: 8px;">
        </div>
    </aside>

    <nav class="mobile-nav">
        <a href="#" class="mobile-link active"><i class="fa-solid fa-house"></i><span>Home</span></a>
        <a href="/scanner/{{slug}}?auth={{auth_token}}" class="mobile-link"><div class="scan-fab"><i class="fa-solid fa-camera"></i></div><span>Scanner</span></a>
        <button onclick="openPasswordModal()" class="mobile-link" style="background:none; border:none;"><i class="fa-solid fa-gear"></i><span>Admin</span></button>
    </nav>

    <main class="main-content">
        <header class="header-flex">
            <div>
                <span class="business-badge">● Établissement Actif</span>
                <h1 style="margin: 8px 0 0; font-size: 32px; font-weight: 900; letter-spacing: -1px;">{{nom}}</h1>
            </div>
            <div id="currentDate" style="color: var(--primary); font-weight: 700; font-size: 14px; background: white; padding: 8px 16px; border-radius: 12px; border: 1px solid var(--border);"></div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <span>Total Membres</span>
                <h2>{{nbClients}}</h2>
            </div>
            <div class="stat-card">
                <span>Points Distribués</span>
                <h2>{{sommePoints}}</h2>
            </div>
        </div>

        <div class="section-card">
            <h3 class="section-title"><i class="fa-solid fa-clock-rotate-left" style="color: var(--primary);"></i> Derniers Passages</h3>
            <div id="scansList">
                <p style="color: var(--text-light); font-size: 14px;">Chargement de l'historique...</p>
            </div>
        </div>

        <div class="section-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;">
                <h3 class="section-title" style="margin:0;">Membres Fidélité</h3>
                <div style="position: relative; width: 100%; max-width: 300px;">
                    <i class="fa-solid fa-magnifying-glass" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-light);"></i>
                    <input type="text" id="searchInput" onkeyup="searchMember()" placeholder="Rechercher..." style="width: 100%; padding: 10px 10px 10px 35px; border-radius: 12px; border: 1px solid var(--border); outline: none;">
                </div>
            </div>
            
            <div class="table-container">
                <table id="membersTable">
                    <thead>
                        <tr>
                            <th>Nom</th>
                            <th>Contact</th>
                            <th>Points</th>
                            <th style="text-align:right">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        {{listClients}}
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<div id="passwordModal">
    <div class="modal-box">
        <h3 style="margin:0 0 20px; font-weight: 800;">Paramètres de Sécurité</h3>
        <form id="changePasswordForm">
            <label style="font-size: 12px; font-weight: 700;">ANCIEN MOT DE PASSE</label>
            <input type="password" id="old_password" class="modal-input" required>
            <label style="font-size: 12px; font-weight: 700;">NOUVEL ID ACCÈS</label>
            <input type="password" id="new_password" class="modal-input" required>
            <button type="submit" class="modal-btn">Mettre à jour</button>
            <button type="button" onclick="closePasswordModal()" style="width: 100%; background: none; border: none; margin-top: 10px; color: var(--text-light); font-weight: 600; cursor: pointer;">Annuler</button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const sbUrl = '{{supabase_url}}'; 
    const sbKey = '{{supabase_key}}';
    const sbClient = window.supabase.createClient(sbUrl, sbKey);

    document.getElementById('currentDate').innerText = new Intl.DateTimeFormat('fr-FR', { 
        day: 'numeric', month: 'long', year: 'numeric' 
    }).format(new Date());

    async function chargerHistorique() {
        const businessId = "{{business_id}}";
        if (!businessId || businessId.includes('{{')) return;

        try {
            const { data: scans, error } = await sbClient
                .from('scans')
                .select('*')
                .eq('business_id', businessId)
                .order('created_at', { ascending: false })
                .limit(5);

            if (error) throw error;

            const container = document.getElementById('scansList');
            if (scans && scans.length > 0) {
                container.innerHTML = scans.map(s => `
                    <div style="display:flex; justify-content:space-between; align-items:center; padding:12px; background:#f8fafc; border-radius:12px; margin-bottom:8px;">
                        <div>
                            <div style="font-weight:700; font-size:14px;">${s.client_nom}</div>
                            <div style="font-size:11px; color:var(--text-light);">${new Date(s.created_at).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })}</div>
                        </div>
                        <div style="color:var(--success); font-weight:800; font-size:13px;">+1 PT</div>
                    </div>
                `).join('');
            } else {
                container.innerHTML = '<p style="text-align:center; color:var(--text-light); font-size:13px;">Aucun scan récent.</p>';
            }
        } catch (err) { console.error(err); }
    }

    function searchMember() {
        const filter = document.getElementById("searchInput").value.toLowerCase();
        const tr = document.querySelectorAll("#membersTable tbody tr");
        tr.forEach(row => {
            row.style.display = row.textContent.toLowerCase().includes(filter) ? "" : "none";
        });
    }

    function openPasswordModal() { document.getElementById('passwordModal').style.display = 'flex'; }
    function closePasswordModal() { document.getElementById('passwordModal').style.display = 'none'; }

    window.onload = chargerHistorique;
</script>

</body>
</html>
