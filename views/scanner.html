<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner | {{nom}}</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #000000; font-family: 'Inter', sans-serif; overflow: hidden; }
        .scanner-overlay { border: 2px solid rgba(99, 102, 241, 0.2); box-shadow: 0 0 0 100vmax rgba(0, 0, 0, 0.8); }
        .scan-line { animation: scan 2s infinite linear; position: absolute; width: 100%; height: 2px; background: #6366f1; box-shadow: 0 0 15px #6366f1; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        .flash-success { animation: flash 0.4s ease-out; }
        @keyframes flash { 0% { background: #22c55e; } 100% { background: transparent; } }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen p-4">
    <audio id="beepAudio" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <header class="w-full max-w-md flex items-center justify-between mt-4 mb-10 px-2">
        <div class="flex items-center gap-3">
            <img src="{{logo_url}}" class="w-10 h-10 object-contain rounded-xl bg-white p-1" alt="Logo">
            <h1 class="text-white font-black text-sm uppercase leading-none tracking-tight">{{nom}}</h1>
        </div>
        <button onclick="window.location.href='/dashboard/{{slug}}?auth='+new URLSearchParams(window.location.search).get('auth')" 
                class="w-10 h-10 rounded-full bg-slate-900 flex items-center justify-center text-slate-400 hover:text-white border border-slate-800 transition">
            <i class="fa-solid fa-xmark"></i>
        </button>
    </header>

    <div id="camera-container" class="relative w-72 h-72 rounded-[3.5rem] overflow-hidden border-2 border-indigo-600/20 shadow-2xl">
        <video id="video" class="w-full h-full object-cover"></video>
        <div class="absolute inset-0 scanner-overlay">
            <div class="scan-line"></div>
        </div>
    </div>

    <div class="w-full max-w-xs mt-10 mb-8">
        <div id="status-card" class="bg-slate-900/80 border border-slate-800 p-4 rounded-3xl text-center shadow-lg">
            <div id="status-text" class="text-[10px] font-black text-slate-500 uppercase tracking-widest text-indigo-400">
                Prêt (Caméra ou Laser actif)
            </div>
        </div>
    </div>

    <script>
        const codeReader = new ZXing.BrowserQRCodeReader();
        const beep = document.getElementById('beepAudio');
        const statusText = document.getElementById('status-text');
        const cameraBox = document.getElementById('camera-container');
        
        let isScanning = true;
        const token = new URLSearchParams(window.location.search).get('auth');
        const pathParts = window.location.pathname.split('/');
        const slug = pathParts[pathParts.length - 1];

        // --- LOGIQUE SCANNER PHYSIQUE (DATALOGIC) ---
        let barcodeBuffer = "";
        let lastKeyTime = Date.now();

        window.addEventListener('keydown', (e) => {
            const currentTime = Date.now();
            
            // Si le délai entre deux touches est > 50ms, on considère que c'est une frappe humaine, on reset
            if (currentTime - lastKeyTime > 50) {
                barcodeBuffer = "";
            }

            lastKeyTime = currentTime;

            if (e.key === 'Enter') {
                if (barcodeBuffer.length > 2) {
                    processScanResult(barcodeBuffer);
                    barcodeBuffer = "";
                }
            } else {
                // On n'ajoute que les caractères alphanumériques
                if (e.key.length === 1) {
                    barcodeBuffer += e.key;
                }
            }
        });

        // Lancement caméra
        window.addEventListener('load', () => {
            startScanner();
        });

        function processScanResult(decodedText) { 
            if (!isScanning) return;
            isScanning = false;
            
            // On nettoie l'URL pour ne garder que l'ID client
            const decodedId = decodedText.trim().split('/').pop(); 
            
            try { beep.play(); } catch(e) {}
            cameraBox.classList.add('flash-success');
            setTimeout(() => cameraBox.classList.remove('flash-success'), 400);

            statusText.innerText = "TRAITEMENT...";

            fetch(`/dashboard/api/scan/${slug}?auth=${token}`, { 
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}` // <--- AJOUTE CETTE LIGNE
                },
                body: JSON.stringify({ customer_id: decodedId }) 
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    statusText.innerHTML = `<span class="text-green-500 font-bold">✓ POINT AJOUTÉ !</span>`;
                } else {
                    statusText.innerHTML = `<span class="text-red-500 font-bold">${data.message.toUpperCase()}</span>`;
                }
                
                setTimeout(() => { 
                    isScanning = true; 
                    statusText.innerText = "PRÊT POUR LE PROCHAIN SCAN"; 
                }, 2500);
            })
            .catch(err => {
                statusText.innerHTML = `<span class="text-red-500 font-bold">ERREUR RÉSEAU</span>`;
                isScanning = true;
            });
        }

        function startScanner() {
            codeReader.decodeFromVideoDevice(null, 'video', (result) => {
                if (result && isScanning) processScanResult(result.text);
            }).catch((err) => { 
                // Si pas de caméra, on laisse le mode laser physique actif
                statusText.innerText = "MODE LASER UNIQUEMENT"; 
            });
        }
    </script>
</body>
</html>
