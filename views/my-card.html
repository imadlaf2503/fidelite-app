<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{nom}} | Carte</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="{{logo_url}}">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; background-color: #000; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow: hidden; }

        #main-card {
            width: 92%; max-width: 400px; height: 35vh; margin-top: 25px;
            position: relative; border-radius: 24px; overflow: hidden;
            background-color: #111; transition: all 0.5s ease;
        }

        .studio-container { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; transition: opacity 0.4s ease; }

        /* ANIMATION FLASH (SHINE) */
        .shine-effect::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.7), transparent);
            transform: skewX(-20deg); animation: shineAnim 0.7s ease-in-out; z-index: 100;
        }
        @keyframes shineAnim { 0% { left: -100%; } 100% { left: 150%; } }

        /* MODE CADEAU (OR) */
        .is-gold {
            background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c) !important;
            animation: goldPulse 0.6s infinite alternate !important;
            box-shadow: 0 0 40px #ffd700 !important;
        }
        @keyframes goldPulse { 0% { transform: scale(1); } 100% { transform: scale(1.03); } }

        #splash-screen { position: fixed; inset: 0; background: #fff; z-index: 9999; display: flex; align-items: center; justify-content: center; transition: 0.8s ease; }
        #splash-screen.hidden { opacity: 0; visibility: hidden; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div style="width: 30px; height: 30px; border: 3px solid #f3f3f3; border-top: 3px solid #000; border-radius: 50%; animation: spin 1s linear infinite;"></div>
    </div>

    <div id="main-card">
        <div class="studio-container" id="studio-content">
            {{CONTENU_STUDIO}}
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient("{{supabase_url}}", "{{supabase_key}}");
        const threshold = parseInt("{{threshold}}") || 10;

        function triggerUpdate(newPts) {
            console.log("Nouveaux points:", newPts);
            const card = document.getElementById('main-card');
            const container = document.getElementById('studio-content');
            
            // 1. MISE À JOUR DU TEXTE (Cible ta classe pts-value)
            const ptsDisplay = container.querySelector('.pts-value');
            if (ptsDisplay) {
                ptsDisplay.innerText = newPts;
            }

            // 2. VIBRATION
            if (navigator.vibrate) navigator.vibrate(200);

            // 3. FLASH ANIMATION
            card.classList.remove('shine-effect');
            void card.offsetWidth; 
            card.classList.add('shine-effect');

            // 4. GESTION DU PALIER CADEAU
            if (newPts > 0 && newPts % threshold === 0) {
                card.classList.add('is-gold');
                // On cache ton studio-bg pour laisser voir l'effet Or
                const bg = container.querySelector('.studio-bg');
                if(bg) bg.style.display = 'none'; 
                
                setTimeout(() => {
                    card.classList.remove('is-gold');
                    if(bg) bg.style.display = 'block';
                }, 5000);
            }
        }

        // ECOUTE TEMPS RÉEL
        _supabase.channel('card-realtime')
            .on('postgres_changes', { 
                event: 'UPDATE', 
                schema: 'public', 
                table: 'customers', 
                filter: `id=eq.{{customer_id}}` 
            }, payload => {
                triggerUpdate(payload.new.points);
            })
            .subscribe();

        window.onload = () => {
            setTimeout(() => document.getElementById('splash-screen').classList.add('hidden'), 1000);
        };
    </script>

    <style> @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } </style>
</body>
</html>
