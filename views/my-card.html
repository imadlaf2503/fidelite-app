<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ma Carte | {{nom}}</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="{{logo_url}}">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Poppins:wght@600&family=Reenie+Beanie&display=swap');

        :root {
            --wallet-bg: #000000; 
            --card-bg: #1e293b;   
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.4);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--wallet-bg);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; 
            min-height: 100vh;
            color: var(--text-main);
            overflow: hidden;
        }

        /* --- CARTE (35% DE L'ÉCRAN) --- */
        .wallet-card {
            width: 92%;
            max-width: 400px;
            height: 35vh; 
            background-color: var(--card-bg);
            border-radius: 24px;
            margin-top: 25px;
            position: relative;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            padding: 22px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid rgba(255,255,255,0.1);
            animation: cardFadeIn 0.8s ease-out;
        }

        @keyframes cardFadeIn {
            0% { transform: translateY(-20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .business-logo {
            max-width: 110px;
            max-height: 35px;
            object-fit: contain;
        }
        .pts-badge {
            background: rgba(255,255,255,0.15);
            padding: 7px 14px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 15px;
        }

        /* --- CENTRE : QR CODE AGRANDI --- */
        .card-center {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
        }
        .qr-container {
            background: white;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .qr-container img {
            display: block;
            height: 16vh; 
            width: auto;
        }

        .card-bottom {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .client-info {
            display: flex;
            flex-direction: column;
        }
        .label {
            font-size: 8px;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--text-dim);
            letter-spacing: 1.2px;
            margin-bottom: 2px;
        }
        .client-name {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        /* --- SIGNATURE LAI AU STYLO --- */
        .lai-signature {
            font-family: 'Reenie Beanie', cursive;
            font-size: 34px; 
            color: var(--text-main);
            opacity: 0.7;
            transform: rotate(-4deg);
            margin-bottom: -5px;
        }

        /* État GOLD (Récompense) */
        .is-reward-ready {
            background: linear-gradient(135deg, #fbbf24, #d97706) !important;
            border: none;
        }
        .is-reward-ready .lai-signature, 
        .is-reward-ready .client-name,
        .is-reward-ready .pts-badge { color: #000 !important; }
        .is-reward-ready .label { color: rgba(0,0,0,0.5); }

        /* SPLASH SCREEN OPTIMISÉ */
        #splash-screen {
            position: fixed; inset: 0; background: #fff;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: 0.5s; font-family: 'Poppins', sans-serif;
        }
        #splash-screen.hidden { opacity: 0; visibility: hidden; }
        .splash-logo { max-width: 100px; max-height: 80px; object-fit: contain; margin-bottom: 20px; animation: pulse 1.5s infinite; }
        .splash-text-container { text-align: center; color: #1e293b; }
        .splash-title { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #94a3b8; margin-bottom: 5px; }
        .splash-nom { font-size: 18px; font-weight: 800; color: #0f172a; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* PROMPT INSTALLATION */
        #install-prompt {
            position: fixed; bottom: 30px; width: 85%;
            background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
            border-radius: 24px; padding: 20px; display: none; z-index: 1000;
            color: #000; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
    </style>
</head>

<body>

    <div id="splash-screen">
        <img src="{{logo_url}}" class="splash-logo">
        <div class="splash-text-container">
            <div class="splash-title">Carte de Fidélité</div>
            <div class="splash-nom">{{nom}}</div>
        </div>
        <div style="margin-top: 30px; width: 20px; height: 20px; border: 2px solid #f1f5f9; border-top: 2px solid #1e293b; border-radius: 50%; animation: spin 1s linear infinite;"></div>
    </div>

    <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>

    <div class="wallet-card" id="main-card">
        
        <div class="card-top">
            <img src="{{logo_url}}" class="business-logo">
            <div class="pts-badge pts">{{points}} PTS</div>
        </div>

        <div class="card-center">
            <div class="qr-container">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data={{customer_id}}&ecc=M">
            </div>
        </div>

        <div class="card-bottom">
            <div class="client-info">
                <span class="label">Propriétaire</span>
                <span class="client-name">{{prenom}} {{nom_client}}</span>
            </div>
            
            <div class="lai-signature">
                Lai
            </div>
        </div>
    </div>

    <div id="install-prompt">
        <p style="margin:0; font-size: 14px; font-weight: 800;">Installer la carte</p>
        <p style="margin:10px 0; font-size: 12px; opacity: 0.7;">Appuyez sur <i class="fa-solid fa-arrow-up-from-bracket"></i> puis "Sur l'écran d'accueil".</p>
        <button onclick="this.parentElement.style.display='none'" style="border:none; background:#000; color:#fff; padding: 12px; border-radius: 12px; width:100%; font-weight:700;">D'accord</button>
    </div>

    <script>
        const supabaseUrl = "{{supabase_url}}";
        const supabaseKey = "{{supabase_key}}";
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
        const customerId = "{{customer_id}}";
        const mainCard = document.getElementById('main-card');

        window.addEventListener('load', () => {
            setTimeout(() => document.getElementById('splash-screen').classList.add('hidden'), 3000);
        });

        function checkPointsLevel(pts) {
            if (pts >= 10) mainCard.classList.add('is-reward-ready');
            else mainCard.classList.remove('is-reward-ready');
        }

        _supabase.channel('any').on('postgres_changes', { 
            event: 'UPDATE', schema: 'public', table: 'customers', filter: `id=eq.${customerId}` 
        }, payload => {
            const newPoints = payload.new.points;
            document.querySelector('.pts').innerText = `${newPoints} PTS`;
            checkPointsLevel(newPoints);
        }).subscribe();

        window.onload = () => checkPointsLevel(parseInt("{{points}}"));

        if (!window.navigator.standalone) {
            setTimeout(() => document.getElementById('install-prompt').style.display = 'block', 4500);
        }
    </script>
</body>
</html>
