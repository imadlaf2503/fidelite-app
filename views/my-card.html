<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{nom}} | Carte</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="{{nom}}">
    <link rel="apple-touch-icon" href="{{logo_url}}">

    <link rel="manifest" href="/manifest.json?id={{customer_id}}">
    <meta name="theme-color" content="#000000">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0;
            background-color: #000000;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow: hidden;
        }

        /* LA CARTE */
        #main-card {
            width: 92%;
            max-width: 400px;
            height: 35vh; 
            margin-top: 25px;
            position: relative;
            border-radius: 24px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            overflow: hidden;
            background-color: transparent;
            animation: cardFadeIn 0.8s ease-out;
            transition: all 0.5s ease;
        }

        .studio-container {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            transition: opacity 0.3s ease;
        }

        .is-gold {
            background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c) !important;
            animation: goldPulse 0.6s infinite alternate !important;
        }

        @keyframes goldPulse {
            0% { box-shadow: 0 0 20px #ffd700; transform: scale(1.02); }
            100% { box-shadow: 0 0 40px #ffd700; transform: scale(1.05); }
        }

        @keyframes cardFadeIn { 0% { transform: translateY(-20px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        
        .shine-effect::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-20deg); animation: shineAnim 0.8s ease-in-out;
            z-index: 100;
        }
        @keyframes shineAnim { 0% { left: -100%; } 100% { left: 150%; } }

        #splash-screen {
            position: fixed; inset: 0; background: #fff; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.8s ease;
        }
        #splash-screen.hidden { opacity: 0; visibility: hidden; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="{{logo_url}}" style="max-width: 120px; margin-bottom: 10px;">
        <div style="text-align: center; margin-bottom: 20px; font-family: sans-serif;">
            <div style="font-size: 12px; text-transform: uppercase; color: #888;">Carte de Fidélité</div>
            <div style="font-size: 20px; font-weight: bold; color: #000;">{{nom}}</div>
        </div>
        <div style="width: 24px; height: 24px; border: 3px solid #f3f3f3; border-top: 3px solid #E8612D; border-radius: 50%; animation: spin 1s linear infinite;"></div>
    </div>

    <div id="main-card">
        <div class="studio-container">
            {{CONTENU_STUDIO}}
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient("{{supabase_url}}", "{{supabase_key}}");
        const threshold = parseInt("{{threshold}}") || 10;
        
        function triggerUpdate(newPts) {
            const card = document.getElementById('main-card');
            const container = document.querySelector('.studio-container');
            const studioBg = document.querySelector('.studio-bg');
            const ptsDisplay = document.querySelector('.pts-value');
            
            if(ptsDisplay) { ptsDisplay.innerText = newPts; }
            card.classList.add('shine-effect');
            setTimeout(() => card.classList.remove('shine-effect'), 800);

            if (newPts > 0 && newPts % threshold === 0) {
                card.classList.add('is-gold');
                if(studioBg) studioBg.style.opacity = "0";
                container.style.opacity = "0.3";

                setTimeout(() => {
                    card.classList.remove('is-gold');
                    if(studioBg) studioBg.style.opacity = "1";
                    container.style.opacity = "1";
                }, 3000);
            }
        }

        _supabase.channel('changes').on('postgres_changes', { 
            event: 'UPDATE', schema: 'public', table: 'customers', filter: `id=eq.{{customer_id}}` 
        }, payload => triggerUpdate(payload.new.points)).subscribe();

        window.onload = () => setTimeout(() => document.getElementById('splash-screen').classList.add('hidden'), 1500);
    </script>
</body>
</html>
